  - id: reddit-sideproject-01
    platform: reddit
    status: draft
    subreddit: SideProject
    title: "I built a local-first Mac dictation app that types into any focused app"
    text: |
      I built Qwen Dictation because I wanted a faster push-to-talk dictation flow on macOS.

      The interaction is simple: focus any text field, hold Right Ctrl, speak, and the app types into the current app. It uses local ASR on the Mac instead of a cloud API.

      It is still a developer MVP. The install flow uses Homebrew, Python, PortAudio, and a Hugging Face model download, so I am mostly looking for feedback from Mac users who are comfortable with terminal installs.

      GitHub: https://github.com/jhoshim89/qwen-dictation

      I would especially appreciate feedback on:
      - install friction
      - whether Right Ctrl feels like a good trigger
      - accuracy with real microphone input
      - what should be packaged first for a proper macOS app

  - id: show-hn-01
    platform: hacker-news
    status: draft
    title: "Show HN: Qwen Dictation - local Mac dictation that types into any app"
    text: |
      I built a local-first macOS dictation app powered by Qwen3-ASR.

      The main interaction is push-to-talk: hold Right Ctrl, speak, and it types into the currently focused text field. It works in apps like Cursor, ChatGPT, Slack, mail, browsers, and editors because it uses the normal macOS typing path.

      The app runs from the menu bar, has a small settings dashboard, supports vocabulary registration for names and specialist terms, and processes audio locally on the Mac.

      It is still an MVP. The current install path uses Homebrew, Python, PortAudio, and a Hugging Face model download, so it is most suitable for developers and local-AI users right now.

      GitHub: https://github.com/jhoshim89/qwen-dictation

  - id: show-hn-first-comment
    platform: hacker-news
    status: draft
    text: |
      A few notes:

      - This is currently a developer MVP, not a polished consumer app.
      - The main reason I built it was to get a faster local push-to-talk flow on macOS.
      - The current install script uses Homebrew, Python, PortAudio, and Hugging Face model download.
      - Qwen3-ASR is the default engine because my current testing is focused on Korean and vocabulary-aware dictation.
      - I am especially interested in feedback on install friction, real microphone accuracy, and what packaging step would make this useful to more Mac users.
