name: Bug report
description: Report a reproducible problem with Qwen Dictation.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail to reproduce it on macOS.
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "Example: macOS 15.5"
    validations:
      required: true
  - type: input
    id: mac-model
    attributes:
      label: Mac model
      placeholder: "Example: MacBook Pro M3 Pro"
    validations:
      required: false
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch Qwen Dictation
        2. Focus a text field
        3. Hold Right Cmd
        4. Speak...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or terminal output
      render: text
    validations:
      required: false
