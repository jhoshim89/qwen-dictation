name: Feature request
description: Suggest an improvement or workflow for Qwen Dictation.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: "Describe the workflow pain or missing capability."
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      placeholder: "Describe the behavior you want."
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dictation accuracy
        - Hotkeys
        - Model management
        - Installation
        - macOS app packaging
        - Dashboard
        - Other
    validations:
      required: true
